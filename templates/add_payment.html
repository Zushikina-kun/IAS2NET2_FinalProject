<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Payment — Gym Membership System</title>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--bg:#0b0f1a;--surface:#111827;--border:#1f2937;--accent:#f97316;--accent2:#fb923c;--text:#f1f5f9;--muted:#64748b;--error:#f87171}
        body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column}
        .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
        .topbar-brand{font-size:0.9rem;font-weight:700;letter-spacing:0.5px;text-transform:uppercase}.topbar-brand span{color:var(--accent)}
        .back-link{font-size:0.82rem;color:var(--muted);text-decoration:none}.back-link:hover{color:var(--text)}
        .center{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:32px 24px}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;width:100%;max-width:500px}
        .card-title{font-size:1.1rem;font-weight:600;margin-bottom:4px}.card-sub{font-size:0.8rem;color:var(--muted);margin-bottom:24px}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .field{margin-bottom:16px}
        .field label{display:block;font-size:0.73rem;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
        .field input,.field select,.field textarea{width:100%;padding:10px 13px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:0.88rem;outline:none}
        .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
        .field select option{background:var(--surface)}
        .btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:4px}
        .btn:hover{background:var(--accent2)}
        .error-box{background:#7f1d1d22;border:1px solid #f8717144;color:var(--error);padding:10px 13px;border-radius:7px;font-size:0.82rem;margin-bottom:16px}
    </style>
</head>
<body>
<div class="topbar">
    <div class="topbar-brand">🏋️ Gym <span>Membership</span> System &nbsp;/&nbsp; Record Payment</div>
    <a href="/payments" class="back-link">← Payments</a>
</div>
<div class="center">
    <div class="card">
        <div class="card-title">Record Payment</div>
        <div class="card-sub">Log a membership payment from a gym member.</div>

        {% if error %}<div class="error-box">{{ error }}</div>{% endif %}

        <form method="POST">
            <div class="field">
                <label>Member</label>
                <select name="folder_name" required>
                    <option value="">— Select Member —</option>
                    {% for m in members %}
                    <option value="{{ m.folder_name }}">{{ m.full_name }} ({{ m.membership_type }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="row">
                <div class="field">
                    <label>Amount (₱)</label>
                    <input type="number" name="amount" step="0.01" min="1" placeholder="500.00" required>
                </div>
                <div class="field">
                    <label>Payment Method</label>
                    <select name="method">
                        <option value="cash">Cash</option>
                        <option value="gcash">GCash</option>
                        <option value="card">Card</option>
                        <option value="bank">Bank Transfer</option>
                    </select>
                </div>
            </div>
            <div class="field">
                <label>Payment Date</label>
                <input type="date" name="payment_date" value="{{ today if today else '' }}">
            </div>
            <div class="field">
                <label>Description / Notes</label>
                <input type="text" name="description" placeholder="e.g. Monthly dues - June 2026">
            </div>
            <button type="submit" class="btn">💰 Record Payment</button>
        </form>
    </div>
</div>
<script>
document.querySelector('input[name="payment_date"]').value = new Date().toISOString().split('T')[0];
</script>
</body>
</html>
