<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Gym Membership System</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg:      #0b0f1a;
            --surface: #111827;
            --border:  #1f2937;
            --accent:  #f97316;
            --text:    #f1f5f9;
            --muted:   #64748b;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            text-align: center;
        }
        .code  { font-size: 5rem; font-weight: 800; color: var(--accent); line-height: 1; }
        .msg   { font-size: 1.1rem; color: var(--text); }
        .sub   { font-size: 0.82rem; color: var(--muted); }
        a {
            margin-top: 8px;
            display: inline-block;
            padding: 9px 22px;
            background: var(--accent);
            color: #fff;
            border-radius: 7px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }
        a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="code">404</div>
    <div class="msg">Page not found</div>
    <div class="sub">The page you're looking for doesn't exist.</div>
    <a href="/dashboard">← Back to Dashboard</a>
</body>
</html>
