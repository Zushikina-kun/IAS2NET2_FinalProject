<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Gym Membership System</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0b0f1a;
            --surface: #111827;
            --border:  #1f2937;
            --accent:  #f97316;
            --accent2: #fb923c;
            --text:    #f1f5f9;
            --muted:   #64748b;
            --error:   #f87171;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
            padding: 24px;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }
        .logo-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }
        .logo-title span { color: var(--accent); }
        .logo-sub {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 4px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text);
        }

        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .field input {
            width: 100%;
            padding: 10px 13px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .field input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 7px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 4px;
        }
        .btn:hover { background: var(--accent2); }

        .error-box {
            background: #7f1d1d22;
            border: 1px solid #f8717144;
            color: var(--error);
            padding: 10px 13px;
            border-radius: 7px;
            font-size: 0.82rem;
            margin-bottom: 16px;
        }

        .security-note {
            font-size: 0.7rem;
            color: var(--muted);
            text-align: center;
            margin-top: 14px;
            line-height: 1.5;
        }

        .footer-note {
            text-align: center;
            font-size: 0.72rem;
            color: var(--muted);
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="logo">
        <div class="logo-icon">🏋️</div>
        <div class="logo-title">Gym <span>Membership</span> System</div>
        <div class="logo-sub">Group 9 — IAS2 Finals Project</div>
    </div>

    <div class="card">
        <div class="card-title">Admin Login</div>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username"
                       placeholder="Enter username"
                       required autofocus autocomplete="username">
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       placeholder="Enter password"
                       required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="security-note">
            🔒 Account locks after 5 failed attempts for 5 minutes
        </div>
    </div>

    <div class="footer-note">
        Directo · Quimson · Madayag &nbsp;|&nbsp; Gym Membership System
    </div>
</div>

</body>
</html>
